services:
  db:
    image: postgres:15
    container_name: videoflix_database
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: videoflix_redis
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_backend
    volumes:
      - .:/app
      - videoflix_media:/app/media
      - videoflix_static:/app/static
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - RUN_MIGRATIONS=true
    depends_on:
      - db
      - redis
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --reload

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_worker
    volumes:
      - .:/app
      - videoflix_media:/app/media
      - videoflix_static:/app/static
    depends_on:
      - db
      - redis
    command: python manage.py rqworker default
    environment:
      - PYTHONUNBUFFERED=1
      - RUN_MIGRATIONS=false

volumes:
  postgres_data:
  redis_data:
  videoflix_media:
  videoflix_static: