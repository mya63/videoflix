<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#141414; font-family:Arial, sans-serif;">
  <div style="max-width:600px; margin:0 auto; background:#141414; color:white; padding:40px 30px;">
    <h1 style="color:#2e3cff; font-size:32px;">Videoflix</h1>

    <h2>Reset your password</h2>

    <p style="font-size:16px; color:#dddddd;">
      You requested a password reset. Click the button below to set a new password.
    </p>

    <a href="{{ reset_link }}"
       style="display:inline-block; margin-top:24px; padding:14px 28px; background:#2e3cff; color:white; text-decoration:none; border-radius:8px; font-weight:bold;">
      Reset password
    </a>

    <p style="margin-top:32px; font-size:12px; color:#888;">
      If the button does not work, copy this link:<br>
      {{ reset_link }}
    </p>
  </div>
</body>
</html>
